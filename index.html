<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARDWARE ANALYZER v1.1</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #121212;
            --accent: #007aff;
            --danger: #ff3b30;
            --text-main: #ffffff;
            --text-dim: #888;
            --border: #2c2c2e;
            --list-bg: #1c1c1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            width: 95%;
            max-width: 700px;
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 { font-size: 1.8rem; margin: 0; text-align: center; }
        .subtitle { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 30px; text-align: center; }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) { .specs-grid { grid-template-columns: 1fr; } }

        .spec-group {
            background: var(--list-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #252525;
        }

        .group-label {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: block;
        }

        .spec-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .label { color: var(--text-dim); }
        .value { color: var(--text-main); font-weight: 500; font-family: monospace; }

        #start-btn {
            background: var(--danger);
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 15px rgba(255, 59, 48, 0.2);
        }

        #start-btn:hover { filter: brightness(1.2); transform: scale(1.01); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>SYSTEM ARCHITECTURE</h1>
    <p class="subtitle">PRE-RUN HARDWARE ANALYSIS</p>

    <div class="specs-grid">
        <div class="spec-group">
            <span class="group-label">PROCESSOR</span>
            <div class="spec-row">
                <span class="label">Model</span>
                <span class="value" id="cpu-name">Analyzing...</span>
            </div>
            <div class="spec-row">
                <span class="label">Logical Cores</span>
                <span class="value" id="cpu-threads">--</span>
            </div>
        </div>

        <div class="spec-group">
            <span class="group-label">GRAPHICS</span>
            <div class="spec-row">
                <span class="label">Renderer</span>
                <span class="value" id="gpu-name">Analyzing...</span>
            </div>
            <div class="spec-row">
                <span class="label">VRAM (Est.)</span>
                <span class="value" id="gpu-vram">--</span>
            </div>
        </div>

        <div class="spec-group">
            <span class="group-label">MEMORY</span>
            <div class="spec-row">
                <span class="label">Capacity</span>
                <span class="value" id="ram-cap">--</span>
            </div>
            <div class="spec-row">
                <span class="label">Clock / Type</span>
                <span class="value" id="ram-detail">Detecting...</span>
            </div>
        </div>

        <div class="spec-group">
            <span class="group-label">ENVIRONMENT</span>
            <div class="spec-row">
                <span class="label">Platform</span>
                <span class="value" id="sys-os">--</span>
            </div>
            <div class="spec-row">
                <span class="label">Engine</span>
                <span class="value">WebGL 2.0</span>
            </div>
        </div>
    </div>

    <button id="start-btn">LAUNCH BENCHMARK</button>
</div>

<script>
    async function analyze() {
        const threads = navigator.hardwareConcurrency || "Unknown";
        document.getElementById('cpu-threads').innerText = threads + " Threads";
        document.getElementById('cpu-name').innerText = threads >= 16 ? "High-End Multicore" : "Standard Processor";

        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Generic";
            document.getElementById('gpu-name').innerText = renderer.split(',')[0].replace(/ANGLE \(.*\)/, '').trim();

            const vram = gl.getParameter(gl.MAX_TEXTURE_SIZE);
            const vramEst = vram >= 16384 ? ">= 8GB" : "4GB or Less";
            document.getElementById('gpu-vram').innerText = vramEst;
        }

        if (navigator.deviceMemory) {
            document.getElementById('ram-cap').innerText = navigator.deviceMemory + " GB";
            document.getElementById('ram-detail').innerText = "DDR4/5 @ High-Freq";
        } else {
            document.getElementById('ram-cap').innerText = "Unknown";
            document.getElementById('ram-detail').innerText = "N/A";
        }

        const platform = navigator.platform;
        document.getElementById('sys-os').innerText = platform;
    }

    window.onload = analyze;

    document.getElementById('start-btn').onclick = () => {
        // 次の工程である「benchmark_gpu.html」を呼び出します
        console.log("Redirecting to GPU Stress Test...");
        window.location.href = "benchmark_gpu.html";
    };
</script>
</body>
</html>
