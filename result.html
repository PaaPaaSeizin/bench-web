<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BENCHMARK RESULT</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .result-card { background: #111; border: 2px solid #ff3300; padding: 40px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 0 50px rgba(255,51,0,0.3); }
        h1 { color: #ff3300; letter-spacing: 2px; margin-bottom: 30px; }
        .score-item { margin: 20px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; }
        .value { font-size: 40px; font-weight: 800; font-family: monospace; }
        .total { color: #fff; text-shadow: 0 0 20px #ff3300; }
        .gpu { color: #007aff; }
        .cpu { color: #00ff41; }
        button { background: #ff3300; border: none; color: #fff; padding: 15px 30px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="result-card">
    <h1>STRESS TEST RESULT</h1>
    
    <div class="score-item">
        <div class="label">Total Score</div>
        <div id="res-total" class="value total">0</div>
    </div>
    
    <div class="score-item">
        <div class="label">GPU Score (Shader/VRAM)</div>
        <div id="res-gpu" class="value gpu">0</div>
    </div>
    
    <div class="score-item">
        <div class="label">CPU Score (Multi-Core)</div>
        <div id="res-cpu" class="value cpu">0</div>
    </div>

    <button onclick="location.href='benchmark.html'">RE-RUN SYSTEM</button>
</div>

<script>
    window.onload = () => {
        document.getElementById('res-total').innerText = Number(localStorage.getItem('bench_total')).toLocaleString();
        document.getElementById('res-gpu').innerText = Number(localStorage.getItem('bench_gpu')).toLocaleString();
        document.getElementById('res-cpu').innerText = Number(localStorage.getItem('bench_cpu')).toLocaleString();
    };
</script>

</body>
</html>
