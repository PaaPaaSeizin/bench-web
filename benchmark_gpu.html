<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>X-STRESS - GPU TORTURE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Consolas', monospace; }
        #stats-panel {
            position: fixed; top: 20px; left: 20px;
            background: rgba(10, 10, 10, 0.9);
            padding: 20px; border: 1px solid #ff3b30; border-radius: 4px;
            color: #fff; z-index: 100; min-width: 300px;
        }
        .bar-container { width: 100%; height: 4px; background: #333; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: #ff3b30; transition: width 0.1s; }
        .danger-text { color: #ff3b30; font-weight: bold; animation: blink 0.5s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        canvas { display: block; }
        #error-log { color: #ff3b30; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div id="stats-panel">
    <div style="font-size: 1.2rem; margin-bottom: 10px;">GPU STRESS: <span class="danger-text">EXTREME</span></div>
    <div>TRIANGLES: <span id="tri-count">0</span></div>
    <div>FPS: <span id="fps-count">0</span></div>
    <div>VRAM LOAD: <span id="vram-stat">LOADING...</span></div>
    <div class="bar-container"><div id="progress-bar"></div></div>
    <div id="status-msg" style="font-size: 0.8rem; margin-top: 10px; color: #888;">INITIALIZING GPU ENGINE...</div>
    <div id="error-log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.161.0/three.min.js"></script>

<script>
    // グローバル変数の宣言
    let scene, camera, renderer, cubeCamera, mirrorSphere, clock;
    let lastFrameTime = performance.now();
    const TEST_DURATION = 15000; 
    let startTime;

    // THREEが読み込まれているかチェックしてから開始する関数
    function checkAndInit() {
        if (typeof THREE !== 'undefined') {
            console.log("Three.js Loaded. Starting Init...");
            init().catch(err => {
                console.error(err);
                const log = document.getElementById('error-log');
                log.style.display = 'block';
                log.innerText = "Error: " + err.message;
            });
        } else {
            console.log("Waiting for Three.js...");
            setTimeout(checkAndInit, 100);
        }
    }

    async function init() {
        startTime = Date.now();
        
        // --- 1. Scene & Camera ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 15);

        // --- 2. Renderer ---
        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 3. VRAM Streaming (Texture) ---
        const texLoader = new THREE.TextureLoader();
        let heavyTexture;
        try {
            // 画像読み込み。失敗しても止まらないようにエラーハンドリング
            heavyTexture = await texLoader.loadAsync('assets/texture.jpg');
            heavyTexture.wrapS = THREE.RepeatWrapping;
            heavyTexture.wrapT = THREE.RepeatWrapping;
            document.getElementById('vram-stat').innerText = "100MB TEXTURE ACTIVE";
        } catch (e) {
            console.warn("Texture not found, using fallback.");
            document.getElementById('vram-stat').innerText = "FALLBACK TEXTURE";
            // 代わりのダミーテクスチャ生成
            heavyTexture = new THREE.DataTexture(new Uint8Array([255,0,0,255]),1,1,THREE.RGBAFormat);
        }

        // --- 4. Reflection (CubeCamera) ---
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { 
            generateMipmaps: true, 
            minFilter: THREE.LinearMipmapLinearFilter 
        });
        cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        scene.add(cubeCamera);

        // --- 5. High-Poly Geometry (512x512 = 約52万ポリゴン) ---
        const geometry = new THREE.SphereGeometry(5, 512, 512);
        const material = new THREE.MeshStandardMaterial({
            map: heavyTexture,
            envMap: cubeRenderTarget.texture,
            roughness: 0.05,
            metalness: 1.0,
            bumpMap: heavyTexture,
            bumpScale: 0.05
        });

        mirrorSphere = new THREE.Mesh(geometry, material);
        mirrorSphere.castShadow = true;
        scene.add(mirrorSphere);

        // 周囲に500個のBoxを配置して描画負荷を増やす
        const smallGeo = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<500; i++) {
            const m = new THREE.Mesh(smallGeo, material);
            m.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
            scene.add(m);
        }

        // --- 6. Lights ---
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        light.shadow.mapSize.set(4096, 4096);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x202020));

        document.getElementById('status-msg').innerText = "ENGINE RUNNING...";
        animate();
    }

    function animate() {
        const elapsed = Date.now() - startTime;
        const progress = (elapsed / TEST_DURATION) * 100;

        if (progress >= 100) {
            finishGpuTest();
            return;
        }

        document.getElementById('progress-bar').style.width = progress + "%";
        
        // --- High Load Logic ---
        if (mirrorSphere) {
            mirrorSphere.rotation.y += 0.01;
            mirrorSphere.rotation.x += 0.005;
            
            // リアルタイム反射の更新（これ自体が非常に重い）
            mirrorSphere.visible = false; 
            cubeCamera.update(renderer, scene);
            mirrorSphere.visible = true;
        }

        renderer.render(scene, camera);

        // --- Stats ---
        const now = performance.now();
        const delta = now - lastFrameTime;
        document.getElementById('fps-count').innerText = Math.round(1000 / delta);
        document.getElementById('tri-count').innerText = renderer.info.render.triangles.toLocaleString();
        lastFrameTime = now;

        requestAnimationFrame(animate);
    }

    function finishGpuTest() {
        document.getElementById('status-msg').innerHTML = "<span class='danger-text'>GPU TEST COMPLETE. SYNCING CPU...</span>";
        const gpuScore = renderer.info.render.triangles / 1000; 
        localStorage.setItem('gpu_result', gpuScore);

        setTimeout(() => {
            // CPU編へ
            window.location.href = "benchmark_cpu.html";
        }, 2000);
    }

    // ウィンドウリサイズ対応
    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 実行開始
    checkAndInit();
</script>

</body>
</html>
